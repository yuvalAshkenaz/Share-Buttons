<head>

    <style>
       /* =========================================
           עיצוב לוח הבקרה - סגנון עורך קוד מודרני (Dark Theme)
           ========================================= */
        body { 
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #f1f5f9; 
            margin: 0; 
            padding: 50px 20px; 
            color: #1e293b; 
        }
        
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { margin: 0; font-size: 2.5rem; color: #0f172a; letter-spacing: -0.5px; }
        
        .container { max-width: 1200px; margin: 0 auto; display: grid; gap: 40px; }
        
        .card { 
            background: #fff; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05); 
            border: 1px solid #e2e8f0;
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            transition: all 0.3s ease;
        }
        
        /* אזור עליון - כותרת ותצוגה מקדימה */
        .card-header { 
            padding: 24px 32px; 
            background: #ffffff; 
            border-bottom: 1px dashed #cbd5e1; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
        }
        
        .card-header h3 { margin: 0; font-size: 22px; color: #334155; font-weight: 600; }
        .card-header .icon-preview { display: flex; align-items: center; gap: 15px; }
        
        /* העיצוב הכללי של הכפתורים בתוך התצוגה המקדימה */
        .card-header button, .card-header a { 
			gap: 10px;
            margin: 0; padding: 0; background: none; border: none; cursor: pointer; text-decoration: none; 
            display: inline-flex; align-items: center; justify-content: center; 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-header .icon-preview svg { width: 44px; height: 44px; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .card-header .icon-preview a.text-link { color: #2563eb; font-weight: bold; font-size: 16px; text-decoration: none; font-family: arial;}
        .card-header .icon-preview a.text-link:hover { text-decoration: underline; color: #1d4ed8; }
        
        /* אזור הקוד למטה - מפוצל למקטעים */
        .card-code { 
            background: #ffffff; 
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .code-block-wrapper {
            position: relative;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .code-title {
            font-size: 14px;
            font-weight: bold;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-code pre { 
            margin: 0; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            font-family: 'Fira Code', 'Courier New', Courier, monospace; 
            font-size: 14px; 
            direction: ltr; 
            text-align: left; 
            line-height: 1.6;
            max-height: 250px;
            overflow-y: auto;
            color: #e2e8f0 !important;
            border: 1px solid #ced0d3; 
            padding: 20px;
            border-radius: 12px;
            background: #0f172a !important; /* דריסת Prism */
        }
		code[class*=language-], pre[class*=language-] {
			color: #fff;
			text-shadow: none;
		}
		.language-css .token.string, .style .token.string, .token.entity, .token.operator, .token.url {
			background: none;
		}
        
        /* כפתור Copyה מרחף צמוד בלוק */
        .copy-btn { 
            background: #e2e8f0;
            color: #0f172a; 
            border: 1px solid #cbd5e1; 
            padding: 6px 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 12px; 
            transition: all 0.2s ease; 
        }
        .copy-btn:hover { background: #cbd5e1; }
        .copy-btn.copied { 
            background: #10b981; 
            border-color: #10b981;
            color: #fff;
        }

        /* עיצוב גלילה */
        pre::-webkit-scrollbar { width: 8px; }
        pre::-webkit-scrollbar-track { background: #1e293b; border-radius: 8px;}
        pre::-webkit-scrollbar-thumb { background: #475569; border-radius: 8px; }
        pre::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>

                css: `.copy-url-btn {
	position: relative;
	background: none;
	border: none;
	cursor: pointer;
	padding: 0;
	display: inline-flex;
	justify-content: center;
	align-items: center;
}
.copy-url-btn svg {
	width: 40px;
	height: 40px;
	display: block;
}
.copy-url-btn .show-on-check {
	position: absolute;
	left: 0;
	top: 0;
	transition: all 0.5s ease;
	opacity: 0;
	transform: scale(0.5);
}
.copy-url-btn .hide-on-check {
	transition: all 0.5s ease;
	opacity: 1;
	transform: scale(1);
}
.copy-url-btn.active .show-on-check {
	opacity: 1;
	transform: scale(1);
}
.copy-url-btn.active .hide-on-check {
	opacity: 0;
	transform: scale(0.5);
}
.copy-url-btn .msg {
	width: max-content;
	font-size: 12px;
	margin: 7px 0 0 0;
	transform: translate(50%, -10px);
	opacity: 0;
	visibility: hidden;
	position: absolute;
	top: 100%;
	right: 50%;
	background: #333;
	color: #fff;
	padding: 4px 8px;
	border-radius: 4px;
	transition: all 0.5s ease;
	pointer-events: none;
}
.copy-url-btn.active .msg {
	opacity: 1;
	visibility: visible;
	transform: translate(50%, 0);
}`,
                js: `document.querySelectorAll('.copy-url-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        var urlToCopy = this.getAttribute('data-url');
        if (!urlToCopy) {
            urlToCopy = window.location.href;
        }

        var _this = this;

        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(urlToCopy).then(function() { showSuccess(_this); });
        } else {
            var textArea = document.createElement("textarea");
            textArea.value = urlToCopy;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); showSuccess(_this); } catch (e) {}
            textArea.remove();
        }
    });

    function showSuccess(button) {
        button.classList.add('active');
        setTimeout(function() { button.classList.remove('active'); }, 3000);
    }
});`
            }
        ];

        const listContainer = document.getElementById('components-list');
        
        // פונקציית עזר ליצירת בלוק קוד (כדי למנוע כפילויות)
        function createCodeBlock(title, codeString, languageClass, idSuffix) {
            if (!codeString) return '';
            
            const escapedCode = codeString.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const elementId = `code-${idSuffix}`;
            
            return `
                <div class="code-block-wrapper">
                    <div class="code-header">
                        <span class="code-title">${title}</span>
                        <button class="copy-btn" onclick="copyTextFromElement('${elementId}', this)">Copy</button>
                    </div>
                    <pre><code id="${elementId}" class="${languageClass}">${escapedCode}</code></pre>
                </div>
            `;
        }

        // יצירת הכרטיסיות בדף
        components.forEach((comp, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let codesHtml = '';
            
            // יצירת קופסאות הקוד (HTML / CSS / JS) במידה וקיימות
            if (comp.html) codesHtml += createCodeBlock('HTML', comp.html, 'language-markup', `${index}-html`);
            if (comp.css)  codesHtml += createCodeBlock('CSS', comp.css, 'language-css', `${index}-css`);
            if (comp.js)   codesHtml += createCodeBlock('JavaScript', comp.js, 'language-javascript', `${index}-js`);

            card.innerHTML = `
                <div class="card-header">
                    <div class="icon-preview">${comp.icon}</div>
                    <h3>${comp.title}</h3>
                </div>
                <div class="card-code">
                    ${codesHtml}
                </div>
            `;
            listContainer.appendChild(card);
        });

        // פונקציית הCopyה
        window.copyTextFromElement = function(elementId, btnElement) {
            const textToCopy = document.getElementById(elementId).innerText;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(() => handleBtnState(btnElement));
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                try { document.execCommand('copy'); handleBtnState(btnElement); } catch (e) {}
                textArea.remove();
            }
        }

        function handleBtnState(btn) {
            const originalText = btn.innerText;
            btn.innerText = 'הועתק!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('copied');
            }, 2000);
        }
    </script>
</body>
</html>

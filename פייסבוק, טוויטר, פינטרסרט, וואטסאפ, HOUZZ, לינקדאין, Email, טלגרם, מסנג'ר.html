	<style type="text/css">
		/* הגדרות בסיס */
		body {
			font-family: Arial, sans-serif;
			background-color: #f9f9f9;
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			margin: 0;
			padding: 20px;
		}
		
		/* תיבה מרכזית */
		.share-container {
			background: #ffffff;
			padding: 40px;
			border-radius: 12px;
			box-shadow: 0 4px 15px rgba(0,0,0,0.05);
			max-width: 600px;
			width: 100%;
			text-align: center;
		}

		/* אזור האייקונים */
		.share-icons {
			display: flex;
			flex-wrap: wrap;
			gap: 15px;
			justify-content: center;
			align-items: center;
		}

		.share-icons button, 
		.share-icons a {
			margin: 0;
			padding: 10px;
			background: none;
			border: none;
			cursor: pointer;
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border-radius: 50%;
			transition: transform 0.2s ease, background-color 0.2s ease;
		}

		.share-icons button:hover, 
		.share-icons a:hover {
			transform: scale(1.1);
			background-color: #f0f0f0;
		}

		/* נגישות - סימון ברור בניווט מקלדת */
		.share-icons button:focus-visible, 
		.share-icons a:focus-visible {
			outline: 3px solid #007BB5;
			outline-offset: 2px;
		}

		.share-icons svg {
			width: 40px;
			height: 40px;
			display: block;
		}

		/* קישורי טקסט נוספים */
		.extra-links {
			margin-top: 30px;
			padding-top: 20px;
			border-top: 1px solid #eeeeee;
			display: flex;
			flex-direction: column;
			gap: 12px;
			font-size: 16px;
		}

		.extra-links a {
			color: #007BB5;
			text-decoration: none;
			transition: color 0.2s;
			border-radius: 4px;
		}

		.extra-links a:hover {
			color: #005882;
			text-decoration: underline;
		}
		
		.extra-links a:focus-visible {
			outline: 2px solid #007BB5;
			outline-offset: 4px;
		}

		/* עיצוב כפתור העתקת הקישור */
		.copy-text-btn { position: relative; }
		.show-on-check { position: absolute; left: 10px; top: 10px; transition: all 0.5s ease; }
		.hide-on-check, .copy-text-btn.active .show-on-check { opacity: 1; transform: scale(1); transition: all 0.5s ease; }
		.show-on-check, .copy-text-btn.active .hide-on-check { opacity: 0; transform: scale(0.5); }
		
		.show-text-on-check {
			width: max-content;
			font-size: 12px;
			margin: 7px 0 0 0;
			transform: translate(50%, -10px);
			opacity: 0;
			visibility: hidden;
			position: absolute;
			top: 100%;
			right: 50%;
			background: #333;
			color: #fff;
			padding: 4px 8px;
			border-radius: 4px;
			transition: all 0.5s ease;
			pointer-events: none;
		}
		.copy-text-btn.active .show-text-on-check { opacity: 1; visibility: visible; transform: translate(50%, 0); }
		.copy-this-text { display: none; }
	</style>

<script>
	document.addEventListener('DOMContentLoaded', function() {
		
		// 1. חלונות שיתוף ברשתות חברתיות (חלון קופץ)
		const shareButtons = document.querySelectorAll('.js-share-btn');
		shareButtons.forEach(btn => {
			btn.addEventListener('click', function() {
				const network = this.getAttribute('data-network');
				const href = this.getAttribute('data-href');
				let shareUrl = '';
				let windowFeatures = 'resizable=yes,status=no,location=no,toolbar=no,menubar=no,fullscreen=no,scrollbars=no,dependent=no,width=750,left=200,height=530,top=100';

				if (network === 'facebook') {
					shareUrl = 'https://www.facebook.com/sharer/sharer.php?u=' + href;
					windowFeatures = 'width=900,height=300'; // דורס גודל ברירת מחדל
				} else if (network === 'twitter') {
					shareUrl = 'https://x.com/share?url=' + href;
					windowFeatures = 'width=700,height=400';
				} else if (network === 'pinterest') {
					const img = this.getAttribute('data-img');
					const desc = this.getAttribute('data-description');
					shareUrl = 'http://pinterest.com/pin/create/button/?url=' + href + '&media=' + img + '&description=' + desc;
				} else if (network === 'houzz') {
					const name = this.getAttribute('data-name');
					const img = this.getAttribute('data-img');
					shareUrl = 'http://www.houzz.com/imageClipperUpload?imageUrl=' + img + '&title=' + name + '&link=' + href;
					windowFeatures = 'width=900,height=400';
				} else if (network === 'linkedin') {
					const name = this.getAttribute('data-name');
					const domain = this.getAttribute('data-domain');
					shareUrl = 'https://www.linkedin.com/shareArticle?mini=true&url=' + href + '&title=' + name + '&source=' + domain;
				}

				if (shareUrl) {
					window.open(shareUrl, '', windowFeatures);
				}
			});
		});

		// 2. פונקציית הדפסה 
		const printBtn = document.querySelector('.js-print-btn');
		if (printBtn) {
			printBtn.addEventListener('click', function() {
				window.print();
			});
		}

		// 3. פונקציית העתקת קישור (API עדכני ונגיש)
		const copyBtn = document.querySelector('.js-copy-btn');
		if (copyBtn) {
			copyBtn.addEventListener('click', function() {
				const textElement = this.nextElementSibling; // div.copy-this-text
				const textToCopy = textElement ? textElement.textContent.trim() : '';

				if (navigator.clipboard && window.isSecureContext) {
					// דפדפנים מודרניים
					navigator.clipboard.writeText(textToCopy).then(() => {
						showCopySuccess(this);
					}).catch(err => console.error('שגיאה בהעתקת הטקסט: ', err));
				} else {
					// Fallback לדפדפנים ישנים
					const textArea = document.createElement("textarea");
					textArea.value = textToCopy;
					textArea.style.position = "absolute";
					textArea.style.left = "-999999px";
					document.body.prepend(textArea);
					textArea.select();
					try {
						document.execCommand('copy');
						showCopySuccess(this);
					} catch (error) {
						console.error('שגיאה בהעתקת הטקסט', error);
					} finally {
						textArea.remove();
					}
				}
			});
		}

		function showCopySuccess(btn) {
			btn.classList.add('active');
			setTimeout(function() {
				btn.classList.remove('active');
			}, 3000);
		}

	});
</script>
